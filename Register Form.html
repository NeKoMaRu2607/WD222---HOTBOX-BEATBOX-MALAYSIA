<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/FORM styles.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <title>Register Form</title>
    <style type="text/css">
        .jumbotron {
            background-image: url(media/Hotbox-Logo.jpg);
            background-size: cover;
        }
    </style>
</head>

<body>
    <div class="jumbotron" style="height: 960px;">
            <div class="container">
                <form action="#" class="form">
                    <div class="form__text">
                        Register
                    </div>
                    <div class="form__group">
                        <label for="firstname" class="form__label">First Name</label>
                        <input type="text" class="form__input" placeholder="First Name" id="firstname" required />
                    </div>
                    <div class="form__group">
                        <label for="lastname" class="form__label">Last Name</label>
                        <input type="text" class="form__input" placeholder="Last Name" id="lastname" required />
                    </div>
                    <div class="form__group">
                        <label for="email" class="form__label">Email</label>
                        <input type="email" class="form__input" placeholder="Email" id="email" required />
                    </div>
                    <div class="form__group">
                        <label for="password" class="form__label">Password</label>
                        <input type="password" class="form__input" placeholder="Password" id="password" required />
                    </div>

                    <div class="form__button">
                        <a href="#" class="button" style="margin-right: 30px;">Register</a>
                        <a href="index.html" class="button">Cancel</a>
                    </div>
                    <div class="form__button">
                        <p style="color: white;">Already have an account ?<br>Click Here to Sign In! <a href="LoginForm.html">Login Here</a></p>
                    </div>
                    <hr style="color: white;">
                    <div class="form__social">
                        <div class="sign">Or Sign up using</div>
                        <div class="social__icon">
                            <i class="fa-brands fa-facebook"></i>
                            <i class="fa-brands fa-google"></i>
                            <i class="fa-brands fa-twitter"></i>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>

</html>
